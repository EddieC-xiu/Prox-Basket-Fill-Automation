<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basket Filler – Kroger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:   #1e6f3e;
      --brand-lt:#2c9954;
      --accent:  #f5a623;
      --bg:      #f4f6f9;
      --card:    #ffffff;
      --border:  #e2e8f0;
      --text:    #1a202c;
      --muted:   #718096;
      --green:   #276749;
      --yellow:  #975a16;
      --red:     #c53030;
      --radius:  10px;
      --shadow:  0 2px 8px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--brand);
      color: #fff;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 60px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .01em; }
    header span { font-size: .85rem; opacity: .75; }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Input card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--brand);
      border-bottom: 1px solid var(--border);
      padding-bottom: .6rem;
    }

    label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .3rem; color: var(--muted); }
    input[type=text], select, textarea {
      width: 100%; padding: .55rem .75rem; border: 1px solid var(--border);
      border-radius: 6px; font-size: .9rem; outline: none;
      transition: border-color .15s;
    }
    input[type=text]:focus, textarea:focus { border-color: var(--brand); }
    .field { margin-bottom: .9rem; }

    textarea { resize: vertical; font-family: "Menlo", "Courier New", monospace; font-size: .8rem; min-height: 250px; }

    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .65rem 1.4rem; border-radius: 6px; font-size: .9rem;
      font-weight: 600; cursor: pointer; border: none; transition: background .15s;
    }
    .btn-primary { background: var(--brand); color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover { background: var(--brand-lt); }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }

    .btn-sm {
      padding: .3rem .75rem; font-size: .8rem; background: var(--bg);
      border: 1px solid var(--border); color: var(--text); border-radius: 5px;
    }
    .btn-sm:hover { background: var(--border); }

    .hint { font-size: .78rem; color: var(--muted); margin-top: .35rem; }

    /* ── Results ── */
    .results-area {}

    .fill-summary {
      display: flex; gap: 1rem; flex-wrap: wrap;
      background: var(--card); border-radius: var(--radius);
      padding: 1.1rem 1.5rem; box-shadow: var(--shadow);
      margin-bottom: 1.2rem; align-items: center;
    }
    .stat { text-align: center; }
    .stat .val { font-size: 1.6rem; font-weight: 700; }
    .stat .lbl { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat.green .val { color: var(--green); }
    .stat.yellow .val { color: var(--yellow); }
    .stat.red .val { color: var(--red); }
    .divider { width: 1px; background: var(--border); align-self: stretch; }

    .run-meta { margin-left: auto; font-size: .8rem; color: var(--muted); }

    /* ── Basket table ── */
    .basket-grid {
      display: flex; flex-direction: column; gap: .75rem;
    }

    .basket-item {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1rem 1.2rem;
      display: grid;
      grid-template-columns: 3fr 4fr 1fr;
      gap: 1rem; align-items: center;
      border-left: 4px solid var(--border);
    }
    .basket-item.exact    { border-left-color: var(--brand); }
    .basket-item.sub      { border-left-color: var(--accent); }
    .basket-item.unmatched { border-left-color: var(--red); }

    .item-query { font-weight: 600; font-size: .92rem; }
    .item-query .tag {
      display: inline-block; font-size: .7rem; font-weight: 500;
      padding: .1rem .45rem; border-radius: 4px; margin-left: .4rem;
      vertical-align: middle;
    }
    .tag.exact     { background: #c6f6d5; color: var(--green); }
    .tag.sub       { background: #feebc8; color: var(--yellow); }
    .tag.unmatched { background: #fed7d7; color: var(--red); }

    .item-prefs { font-size: .77rem; color: var(--muted); margin-top: .25rem; }

    .item-match {}
    .item-name  { font-size: .88rem; font-weight: 500; }
    .item-name a { color: var(--brand); text-decoration: none; }
    .item-name a:hover { text-decoration: underline; }
    .item-notes { font-size: .77rem; color: var(--muted); margin-top: .2rem; }
    .item-size  { font-size: .8rem; color: var(--text); margin-top: .15rem; }

    .item-price-block { text-align: right; }
    .item-price { font-size: 1.15rem; font-weight: 700; color: var(--brand); }
    .item-size-tag { font-size: .75rem; color: var(--muted); }
    .conf-bar {
      height: 5px; border-radius: 3px; background: var(--border);
      margin-top: .4rem; overflow: hidden;
    }
    .conf-fill { height: 100%; border-radius: 3px; }
    .conf-fill.high   { background: var(--brand); }
    .conf-fill.medium { background: var(--accent); }
    .conf-fill.low    { background: var(--red); }
    .conf-label { font-size: .72rem; color: var(--muted); margin-top: .15rem; }

    .item-thumb {
      width: 54px; height: 54px; object-fit: contain;
      border-radius: 6px; border: 1px solid var(--border);
      margin-right: .8rem; float: left;
    }

    @media (max-width: 600px) {
      .basket-item { grid-template-columns: 1fr; }
      .item-price-block { text-align: left; }
    }

    /* ── History ── */
    .history-list { margin-top: .5rem; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: .5rem .75rem; border-radius: 6px; cursor: pointer;
      font-size: .82rem; margin-bottom: .2rem;
    }
    .history-item:hover { background: var(--bg); }
    .history-item .date { color: var(--muted); }
    .history-fill { font-weight: 700; margin-left: .4rem; }

    /* ── Loading / error ── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff5f5; border: 1px solid #fed7d7; border-radius: var(--radius);
      padding: 1rem 1.25rem; color: var(--red); font-size: .9rem;
    }

    .placeholder {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
    }
    .placeholder svg { opacity: .3; margin-bottom: .75rem; }
    .placeholder p { font-size: .95rem; }

    #results { min-height: 200px; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
    <line x1="3" y1="6" x2="21" y2="6"/>
    <path d="M16 10a4 4 0 01-8 0"/>
  </svg>
  <h1>Basket Filler</h1>
  <span>Kroger · automatic product matching</span>
</header>

<main>
  <!-- ── Left: input form ── -->
  <div>
    <div class="card">
      <h2>Shopping List</h2>

      <div class="field">
        <label>ZIP Code</label>
        <input type="text" id="zip" value="90046" maxlength="5" />
      </div>

      <div class="field">
        <label>Items (JSON)</label>
        <textarea id="items-json"></textarea>
        <p class="hint">Array of items with optional <code>brand_preference</code>, <code>size_preference</code>, <code>notes</code>.</p>
      </div>

      <button class="btn btn-primary" id="fill-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Fill Basket
      </button>
    </div>

    <!-- History -->
    <div class="card" style="margin-top:1rem">
      <h2>Recent Runs</h2>
      <div id="history-list" class="history-list">
        <p style="font-size:.82rem;color:var(--muted)">Loading…</p>
      </div>
    </div>
  </div>

  <!-- ── Right: results ── -->
  <div id="results">
    <div class="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <p>Enter your shopping list and click <strong>Fill Basket</strong></p>
    </div>
  </div>
</main>

<script>
// ── Default sample basket ──────────────────────────────────────────────────
const SAMPLE = [
  { query: "milk",          size_preference: "1 gallon" },
  { query: "eggs",          size_preference: "12 count" },
  { query: "avocados",      notes: "organic if possible" },
  { query: "chicken breast",notes: "boneless skinless" },
  { query: "tortilla chips" },
  { query: "greek yogurt",  brand_preference: "Chobani" },
  { query: "peanut butter", size_preference: "16 oz" },
  { query: "bananas" },
  { query: "orange juice" },
  { query: "butter",        size_preference: "16 oz" },
];

const ta = document.getElementById("items-json");
ta.value = JSON.stringify(SAMPLE, null, 2);

// ── Fill basket ────────────────────────────────────────────────────────────
document.getElementById("fill-btn").addEventListener("click", async () => {
  const btn = document.getElementById("fill-btn");
  const zip = document.getElementById("zip").value.trim();

  let items;
  try {
    items = JSON.parse(ta.value);
    if (!Array.isArray(items)) throw new Error("expected JSON array");
  } catch (e) {
    showError("Invalid JSON: " + e.message);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Filling…';
  document.getElementById("results").innerHTML = "";

  try {
    const resp = await fetch("/api/basket", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ retailer: "kroger", zip, items }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || resp.statusText);
    }
    const result = await resp.json();
    renderResult(result);
    loadHistory();
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Fill Basket`;
  }
});

// ── Render result ──────────────────────────────────────────────────────────
function renderResult(result) {
  const filled    = result.items.filter(m => !m.is_unmatched).length;
  const subs      = result.items.filter(m => m.is_substitute).length;
  const unmatched = result.items.filter(m => m.is_unmatched).length;
  const rate      = Math.round(result.fill_rate * 100);

  const totalPrice = result.items
    .filter(m => m.price != null)
    .reduce((s, m) => s + m.price, 0);

  const summary = `
    <div class="fill-summary">
      <div class="stat green">
        <div class="val">${filled}/${result.items.length}</div>
        <div class="lbl">Filled</div>
      </div>
      <div class="divider"></div>
      <div class="stat ${rate === 100 ? 'green' : rate >= 70 ? 'yellow' : 'red'}">
        <div class="val">${rate}%</div>
        <div class="lbl">Fill Rate</div>
      </div>
      <div class="divider"></div>
      <div class="stat yellow">
        <div class="val">${subs}</div>
        <div class="lbl">Substitutes</div>
      </div>
      <div class="divider"></div>
      <div class="stat red">
        <div class="val">${unmatched}</div>
        <div class="lbl">Unmatched</div>
      </div>
      <div class="divider"></div>
      <div class="stat green">
        <div class="val">$${totalPrice.toFixed(2)}</div>
        <div class="lbl">Est. Total</div>
      </div>
      <div class="run-meta">
        Run #${result.run_id} · ${result.zip}
        ${result.store_name ? `· <strong>${result.store_name}</strong>${result.store_city ? `, ${result.store_city}` : ''}${result.store_state ? ` ${result.store_state}` : ''}` : ''}
        · ${new Date(result.created_at).toLocaleTimeString()}
      </div>
    </div>`;

  const grid = result.items.map(itemCard).join("");

  document.getElementById("results").innerHTML =
    summary + `<div class="basket-grid">${grid}</div>`;
}

function itemCard(m) {
  const cls = m.is_unmatched ? "unmatched" : m.is_substitute ? "sub" : "exact";
  const tag = m.is_unmatched ? "unmatched" : m.is_substitute ? "substitute" : "matched";

  const prefs = [
    m.brand_preference ? `Brand: ${m.brand_preference}` : null,
    m.size_preference  ? `Size: ${m.size_preference}`   : null,
    m.notes            ? m.notes                         : null,
  ].filter(Boolean).join(" · ");

  const thumb = m.image_url
    ? `<img class="item-thumb" src="${m.image_url}" alt="" onerror="this.style.display='none'" />`
    : "";

  const nameHtml = m.matched_product_name
    ? (m.product_url
        ? `<a href="${m.product_url}" target="_blank" rel="noopener">${m.matched_product_name}</a>`
        : m.matched_product_name)
    : `<span style="color:var(--red)">Not found</span>`;

  const confPct = Math.round(m.match_confidence * 100);
  const confCls = confPct >= 80 ? "high" : confPct >= 50 ? "medium" : "low";

  const priceHtml = m.price != null
    ? `<div class="item-price">$${m.price.toFixed(2)}</div><div class="item-size-tag">${m.size || ""}</div>`
    : `<div class="item-price" style="color:var(--muted)">—</div>`;

  return `
  <div class="basket-item ${cls}">
    <div>
      <div class="item-query">
        ${m.requested_query}
        <span class="tag ${cls}">${tag}</span>
      </div>
      ${prefs ? `<div class="item-prefs">${prefs}</div>` : ""}
    </div>
    <div class="item-match">
      ${thumb}
      <div class="item-name">${nameHtml}</div>
      <div class="item-notes">${m.match_notes}</div>
    </div>
    <div class="item-price-block">
      ${priceHtml}
      <div class="conf-bar"><div class="conf-fill ${confCls}" style="width:${confPct}%"></div></div>
      <div class="conf-label">${confPct}% conf.</div>
    </div>
  </div>`;
}

// ── History ────────────────────────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById("history-list");
  try {
    const runs = await fetch("/api/runs").then(r => r.json());
    if (!runs.length) {
      el.innerHTML = '<p style="font-size:.82rem;color:var(--muted)">No runs yet.</p>';
      return;
    }
    el.innerHTML = runs.map(r => `
      <div class="history-item" onclick="loadRun(${r.id})">
        <span>${r.retailer} · ${r.zip} · ${r.item_count} items</span>
        <span>
          <span class="history-fill" style="color:${r.fill_rate >= .8 ? 'var(--green)' : 'var(--yellow)'}">
            ${Math.round(r.fill_rate * 100)}%
          </span>
          <span class="date">&nbsp;${new Date(r.created_at).toLocaleString()}</span>
        </span>
      </div>`).join("");
  } catch {
    el.innerHTML = "";
  }
}

async function loadRun(id) {
  const data = await fetch(`/api/runs/${id}`).then(r => r.json());
  const items = data.items.map(row => ({
    requested_query:      row.requested_query,
    brand_preference:     row.brand_preference,
    size_preference:      row.size_preference,
    notes:                row.notes,
    matched_product_name: row.matched_product_name,
    retailer:             data.run.retailer,
    price:                row.price,
    size:                 row.size,
    product_url:          row.product_url,
    image_url:            row.image_url,
    match_confidence:     row.confidence || 0,
    match_notes:          row.match_notes || "",
    is_substitute:        !!row.is_substitute,
    is_unmatched:         !!row.is_unmatched,
    cached:               !!row.cached,
  }));
  const filled = items.filter(m => !m.is_unmatched).length;
  renderResult({
    run_id:     id,
    retailer:   data.run.retailer,
    zip:        data.run.zip,
    created_at: data.run.created_at,
    fill_rate:  data.run.fill_rate,
    items,
  });
}

// ── Error ──────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById("results").innerHTML =
    `<div class="error-box">Error: ${msg}</div>`;
}

// Init
loadHistory();
</script>
</body>
</html>
